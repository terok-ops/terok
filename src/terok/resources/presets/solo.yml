# Solo agent — single fast agent for straightforward tasks.
#
# Good for: quick fixes, small features, one-shot prompts.
# Usage: terok run <project> "<prompt>" --preset solo
#
# Per-provider model keys: each provider uses the model best suited for
# quick tasks. A flat string (e.g. "model: sonnet") works too and applies
# to all providers. Providers not listed here fall back to _default;
# set a provider to null to explicitly unset it and use the _default value.

model:
  claude: sonnet
  codex: codex-mini
  vibe: mistral-small
  _default: fast
max_turns: 25
