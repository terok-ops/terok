# Example terok configuration file
#
# Copy this file to one of the following locations (first existing wins):
#  - ${XDG_CONFIG_HOME:-~/.config}/terok/config.yml (user override)
#  - /etc/terok/config.yml (system-wide default)
#
# Notes:
#  - The CLI command `terok config` shows which paths and files are used.

ui:
  # Default first task port for UI mode (subsequent tasks will auto-increment
  # from this base if the port is busy).
  base_port: 7860

vault:
  # Host-only credential storage (proxy DB, SSH key mapping, proxy routes).
  # Never exposed to containers.
  # Default: ~/.local/share/terok-credentials (or /var/lib/terok-credentials if root)
  # Override with TEROK_VAULT_DIR env var or by editing this file.
  # dir: ~/.local/share/terok-credentials
  #
  # Agent config mounts (_claude-config, _codex-config, etc.) are stored
  # separately under <sandbox_live_dir>/mounts/ (TEROK_SANDBOX_LIVE_DIR).

paths:
  # User projects directory (per-user overlays). Each project is a subdirectory
  # containing a project.yml, e.g. ${user_projects_dir}/myproj/project.yml
  # Default: ${XDG_CONFIG_HOME:-~/.config}/terok/projects
  # user_projects_dir: ~/.config/terok/projects

  # Writable state directory (tasks, caches, etc.).
  # System default (root): /var/lib/terok
  # User default:          ${XDG_DATA_HOME:-~/.local/share}/terok
  # state_dir: ~/.local/share/terok

  # Build artifacts directory for generated files.
  # If not set, defaults to: <state_dir>/build
  # build_dir: ~/.local/share/terok/build

git:
  # Default human identity for git commits (committer).
  # These can be overridden per-project in project.yml under git.human_name/human_email.
  # If not set here, falls back to global git config, then to "Nobody <nobody@localhost>".
  # human_name: Your Name
  # human_email: your.email@example.com

# Default agent for all projects (used for Web UI, and potentially CLI in the future).
# Can be overridden per-project in project.yml, via the DEFAULT_AGENT env var,
# or the --backend CLI flag.
# Valid values: codex, claude, mistral
# default_agent: claude

# TUI Configuration
tui:
  # Default to launching the TUI in tmux mode (equivalent to always using --tmux).
  # When enabled, `terok` will automatically wrap the TUI in a managed tmux
  # session with blue status bar and keyboard shortcuts.
  # Can be overridden with --no-tmux flag.
  # default_tmux: true

# Agent configuration
# -----------------------------------------------------------------
# Native Claude handles global agents and MCPs:
#   - Global agents:  ~/.claude/agents/        (available to all projects)
#   - Global MCPs:    ~/.claude/settings.json  (mcpServers section)
#   - Project agents: <workspace>/.claude/agents/
#   - Project MCPs:   <workspace>/.claude/settings.json
#
# terok converts per-project sub-agent YAML definitions (in project.yml)
# to JSON for the --agents flag at task runtime. See project.yml for examples.
#
# Run `terok config` to see the actual paths on your system.
#
# TODO: future — support global agent definitions here (agent.subagents)
# that would be merged with per-project subagents. Use a generic merge
# approach compatible with multiple agent runtimes.

# Note: GPU passthrough is a per-project opt-in only. Configure it in
# <project>/project.yml under `run.gpus` (true or "all"). There is no
# global or environment switch.

# Experimental features (unstable, may change between versions).
# Can also be enabled per-invocation with --experimental.
# experimental: false

# Agent-specific configuration
# agent:
#   claude:
#     # Allow Claude Code OAuth through the vault.
#     # Default false — Claude OAuth is skipped because its hardcoded BASE_API_URL
#     # sends phantom tokens directly to api.anthropic.com (which rejects them).
#     # When true + experimental, the vault handles OAuth normally and the shield
#     # blocks api.anthropic.com to prevent phantom token leaks.
#     # allow_oauth: false
#     #
#     # Bypass the vault for Claude and expose the real OAuth token
#     # via the shared .credentials.json mount. Claude manages its own refresh.
#     # Shield must allow api.anthropic.com and platform.claude.com.
#     # expose_oauth_token: false
#   codex:
#     # Allow secure vaulted Codex OAuth. The user logs in once via the auth
#     # container; real tokens stay in the host vault and task containers receive
#     # synthetic shared ~/.codex/auth.json plus managed vault URL config.
#     # Currently requires experimental; the secure path has a single code switch
#     # for lifting that gate. The exposed-token path below remains experimental.
#     # allow_oauth: false
#     #
#     # Insecure escape hatch: expose the real Codex auth.json in the shared
#     # ~/.codex mount. This breaks terok's "no real credentials in containers"
#     # promise and should stay behind the experimental gate indefinitely.
#     # expose_oauth_token: false
