exclude = [
    "**/__pycache__",
    "**/tests/**",
    "build",
    "dist",
    ".venv",
    "docs",
    "examples",
    "tmp",
    "analyze_final_state.py",
]

source_roots = ["src"]
exact = false
forbid_circular_dependencies = true
ignore_type_checking_imports = true

# ── Layer Architecture ──────────────────────────────────────────────
#
#   presentation   CLI and TUI frontends (can depend on services + core)
#   services       Domain services / orchestrators (can depend on core)
#   core           Foundation types, config, and pure utilities
#
layers = [
    "presentation",
    "services",
    "core",
]

[external]
exclude = ["pydevd_pycharm", "pydevd"]

# ── PRESENTATION LAYER ──────────────────────────────────────────────

# CLI frontend
[[modules]]
path = "terok.cli"
layer = "presentation"
depends_on = [
    "terok.lib.containers.agent_config",
    "terok.lib.containers.headless_providers",
    "terok.lib.core.config",
    "terok.lib.core.projects",
    "terok.lib.core.version",
    "terok.lib.facade",
    "terok.lib.util.emoji",
    "terok.lib.wizards.new_project",
    "terok.ui_utils.terminal",
]

# TUI frontend
[[modules]]
path = "terok.tui"
layer = "presentation"
depends_on = [
    "terok.lib.containers.agents",
    "terok.lib.containers.autopilot",
    "terok.lib.containers.headless_providers",
    "terok.lib.containers.instructions",
    "terok.lib.containers.runtime",
    "terok.lib.containers.task_display",
    "terok.lib.containers.tasks",
    "terok.lib.core.config",
    "terok.lib.core.projects",
    "terok.lib.core.version",
    "terok.lib.facade",
    "terok.lib.util.emoji",
]

# Service facade (aggregates shared cross-cutting operations)
[[modules]]
path = "terok.lib.facade"
layer = "services"
depends_on = [
    "terok.lib.containers.docker",
    "terok.lib.containers.environment",
    "terok.lib.containers.project_state",
    "terok.lib.containers.task_logs",
    "terok.lib.containers.task_runners",
    "terok.lib.containers.tasks",
    "terok.lib.core.projects",
    "terok.lib.security.auth",
    "terok.lib.security.git_gate",
    "terok.lib.security.ssh",
]

# ── SERVICES LAYER ──────────────────────────────────────────────────
#
# ·· containers ··  Task lifecycle, container runtime, Dockerfiles
#

# Agent configuration (parsing, filtering, wrapper generation)
[[modules]]
path = "terok.lib.containers.agents"
layer = "services"
depends_on = ["terok.lib.containers.headless_providers", "terok.lib.core.config", "terok.lib.core.projects", "terok.lib.util.fs"]

# Headless provider registry (multi-agent autopilot support)
[[modules]]
path = "terok.lib.containers.headless_providers"
layer = "services"
depends_on = ["terok.lib.containers.agent_config", "terok.lib.core.projects"]

# Agent config resolution (layered merging across scopes)
[[modules]]
path = "terok.lib.containers.agent_config"
layer = "services"
depends_on = ["terok.lib.util.config_stack", "terok.lib.core.config", "terok.lib.core.projects"]

# Agent instruction resolution (layered merging with bundled defaults)
[[modules]]
path = "terok.lib.containers.instructions"
layer = "services"
depends_on = ["terok.lib.containers.agent_config"]

# Autopilot container lifecycle (wait, logs)
[[modules]]
path = "terok.lib.containers.autopilot"
layer = "services"
depends_on = ["terok.lib.containers.tasks"]

# Agent log formatters (Claude stream-json, plain text)
[[modules]]
path = "terok.lib.containers.log_format"
layer = "services"
depends_on = ["terok.lib.util.ansi"]

# Task display types and status computation
[[modules]]
path = "terok.lib.containers.task_display"
layer = "services"
depends_on = []

# Agent work status reading
[[modules]]
path = "terok.lib.containers.work_status"
layer = "services"
depends_on = []

# Task log viewing and streaming
[[modules]]
path = "terok.lib.containers.task_logs"
layer = "services"
depends_on = [
    "terok.lib.containers.log_format",
    "terok.lib.containers.runtime",
    "terok.lib.containers.tasks",
    "terok.lib.core.projects",
]

# Task metadata, lifecycle, and queries
[[modules]]
path = "terok.lib.containers.tasks"
layer = "services"
depends_on = [
    "terok.lib.containers.runtime",
    "terok.lib.containers.task_display",
    "terok.lib.containers.work_status",
    "terok.lib.core.config",
    "terok.lib.core.projects",
    "terok.lib.util.ansi",
    "terok.lib.util.emoji",
    "terok.lib.util.fs",
    "terok.lib.util.logging_utils",
]

# Task container runners (CLI, web, headless, restart)
[[modules]]
path = "terok.lib.containers.task_runners"
layer = "services"
depends_on = [
    "terok.lib.containers.agent_config",
    "terok.lib.containers.agents",
    "terok.lib.containers.environment",
    "terok.lib.containers.headless_providers",
    "terok.lib.containers.instructions",
    "terok.lib.containers.ports",
    "terok.lib.containers.runtime",
    "terok.lib.containers.tasks",
    "terok.lib.core.images",
    "terok.lib.core.projects",
    "terok.lib.util.ansi",
    "terok.lib.util.podman",
]

# Container state, GPU args, log streaming
[[modules]]
path = "terok.lib.containers.runtime"
layer = "services"
depends_on = ["terok.lib.core.projects", "terok.lib.util.logging_utils"]

# Task environment & volume mounts
[[modules]]
path = "terok.lib.containers.environment"
layer = "services"
depends_on = ["terok.lib.core.config", "terok.lib.core.projects", "terok.lib.util.fs"]

# Task port allocation
[[modules]]
path = "terok.lib.containers.ports"
layer = "services"
depends_on = ["terok.lib.core.config"]

# Dockerfile generation & image building
[[modules]]
path = "terok.lib.containers.docker"
layer = "services"
depends_on = ["terok.lib.core.config", "terok.lib.core.images", "terok.lib.core.projects", "terok.lib.util.fs"]

# Project infrastructure state (queries podman & filesystem)
[[modules]]
path = "terok.lib.containers.project_state"
layer = "services"
depends_on = [
    "terok.lib.containers.docker",
    "terok.lib.core.config",
    "terok.lib.core.images",
    "terok.lib.core.projects",
]

#
# ·· security ··  Auth, SSH, git gate
#

# API key authentication workflows
[[modules]]
path = "terok.lib.security.auth"
layer = "services"
depends_on = [
    "terok.lib.util.podman",
    "terok.lib.core.config",
    "terok.lib.core.images",
    "terok.lib.core.projects",
    "terok.lib.util.fs",
]

# SSH key management
[[modules]]
path = "terok.lib.security.ssh"
layer = "services"
depends_on = [
    "terok.lib.core.config",
    "terok.lib.core.projects",
    "terok.lib.util.fs",
    "terok.lib.util.template_utils",
]

# Git gate sync & validation
[[modules]]
path = "terok.lib.security.git_gate"
layer = "services"
depends_on = ["terok.lib.core.config", "terok.lib.core.projects"]

#
# ·· wizards ··  Interactive workflows
#

# Interactive project creation
[[modules]]
path = "terok.lib.wizards.new_project"
layer = "services"
depends_on = [
    "terok.lib.core.config",
    "terok.ui_utils.editor",
    "terok.lib.util.fs",
    "terok.lib.util.template_utils",
]

# ── CORE LAYER ──────────────────────────────────────────────────────
#
# ·· core ··  Foundation types & config
#

# Top-level package (version metadata only)
[[modules]]
path = "terok"
layer = "core"
depends_on = []

# Version info
[[modules]]
path = "terok.lib.core.version"
layer = "core"
depends_on = ["terok"]

# Path resolution (FHS/XDG)
[[modules]]
path = "terok.lib.core.paths"
layer = "core"
depends_on = []

# Configuration management
[[modules]]
path = "terok.lib.core.config"
layer = "core"
depends_on = ["terok.lib.core.paths"]

# Project and preset data models (pure types, no I/O)
[[modules]]
path = "terok.lib.core.project_model"
layer = "core"
depends_on = []

# Project discovery, loading, and preset management
[[modules]]
path = "terok.lib.core.projects"
layer = "core"
depends_on = ["terok.lib.core.config", "terok.lib.core.project_model", "terok.lib.util.config_stack"]

# Image naming conventions
[[modules]]
path = "terok.lib.core.images"
layer = "core"
depends_on = []

#
# ·· ui ··  Shared UI helpers (terminal, editor)
#

# Terminal ANSI formatting
[[modules]]
path = "terok.ui_utils.terminal"
layer = "core"
depends_on = ["terok.lib.util.ansi"]
utility = true

# $EDITOR launching
[[modules]]
path = "terok.ui_utils.editor"
layer = "core"
depends_on = []
utility = true

#
# ·· util ··  Pure internal helpers
#

# Podman user namespace handling
[[modules]]
path = "terok.lib.util.podman"
layer = "core"
depends_on = []
utility = true

# Filesystem helpers (mkdir, writable check)
[[modules]]
path = "terok.lib.util.fs"
layer = "core"
depends_on = []
utility = true

# Simple {{VAR}} template rendering
[[modules]]
path = "terok.lib.util.template_utils"
layer = "core"
depends_on = []
utility = true

# ANSI color utilities (used by services layer)
[[modules]]
path = "terok.lib.util.ansi"
layer = "core"
depends_on = []
utility = true

# Debug logging stub
[[modules]]
path = "terok.lib.util.logging_utils"
layer = "core"
depends_on = ["terok.lib.core.paths"]
utility = true

# Emoji display-width utilities
[[modules]]
path = "terok.lib.util.emoji"
layer = "core"
depends_on = []
utility = true

# Generic layered config resolution
[[modules]]
