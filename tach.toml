exclude = [
    "**/__pycache__",
    "**/tests/**",
    "build",
    "dist",
    ".venv",
    "docs",
    "examples",
    "tmp",
    "analyze_final_state.py",
]

source_roots = ["src"]
exact = false
forbid_circular_dependencies = true
ignore_type_checking_imports = true

# ── Layer Architecture ──────────────────────────────────────────────
#
#   presentation      CLI and TUI frontends
#   domain            Project/Task aggregates, facade, task CRUD
#   orchestration     Container lifecycle, env/volumes, Dockerfile, ports
#   instrumentation   Agent config, providers, instructions, wrappers
#   core              Foundation types, config, and pure utilities
#
# NOTE: The sandbox layer has been extracted to the external terok-sandbox
# package. Modules that previously depended on terok.lib.sandbox.* now
# import directly from terok_sandbox.* (external, not tach-managed).
#
layers = [
    "presentation",
    "domain",
    "orchestration",
    "instrumentation",
    "core",
]

[external]
exclude = ["pydevd_pycharm", "pydevd"]

# ── PRESENTATION LAYER ────────────────────────────────────────────

# CLI frontend
[[modules]]
path = "terok.cli"
layer = "presentation"
depends_on = [
    "terok.lib.instrumentation.agent_config",
    "terok.lib.instrumentation.headless_providers",
    "terok.lib.orchestration.hooks",
    "terok.lib.orchestration.tasks",
    "terok.lib.core.config",
    "terok.lib.core.projects",
    "terok.lib.core.version",
    "terok.lib.domain.facade",
    "terok.lib.util.emoji",
    "terok.lib.util.yaml",
    "terok.lib.domain.wizards.new_project",
    "terok.ui_utils.terminal",
]

# TUI frontend
[[modules]]
path = "terok.tui"
layer = "presentation"
depends_on = [
    "terok.lib.instrumentation.agents",
