site_name: terok
site_description: A tool for managing containerized AI coding agent projects using Podman
site_url: https://terok-ai.github.io/terok
repo_url: https://github.com/terok-ai/terok
repo_name: terok-ai/terok

theme:
  name: material
  font:
    text: Ubuntu
    code: Ubuntu Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
        - docs/gen_quality_report.py
        - docs/gen_config_reference.py
        - docs/gen_ci_map.py
        - docs/gen_test_map.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - User Guide:
    - Getting Started: usage.md
    - Config Reference: config-reference.md
    - Container Layers: container-layers.md
    - Container Lifecycle: container-lifecycle.md
    - Shared Directories: shared-dirs.md
    - Security Modes: git-gate-and-security-modes.md
    - Shield Security: shield-security.md
    - Login Design: login-design.md

  - Developer Guide:
    - Contributing: developer.md
    - Agent Compatibility Matrix: agent-compat-matrix.md
    - Integration Test Map: test_map.md
    - CI Workflow Map: ci_map.md
    - Code Quality: quality-report.md
    - Brainstorming:
      - Agent Helpers: brainstorming/todo-agent-helpers.md
      - Per-Task Context Isolation: brainstorming/per-task-context-isolation.md
  - API Reference: reference/

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/terok-ai/terok

extra_css:
  - https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&family=Ubuntu+Mono:wght@400;700&display=swap
  - stylesheets/extra.css
